<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Helvetica Neue',Arial,sans-serif">
  <div style="max-width:480px;margin:32px auto;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
    <!-- Header gradiente tornasol -->
    <div style="background:linear-gradient(135deg,#4facfe,#00f2fe,#f3a0ff,#ff85a2);padding:36px 32px;text-align:center">
      <div style="font-size:48px;margin-bottom:8px">⭐</div>
      <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:900;letter-spacing:2px">KRONOS</h1>
    </div>
    <!-- Contenido -->
    <div style="padding:32px">
      <h2 style="color:#0a0a14;font-size:20px;margin:0 0 12px">¡Bienvenido, {{name}}! 🎉</h2>
      <p style="color:rgba(10,10,20,0.65);font-size:15px;line-height:1.6;margin:0 0 24px">
        Tu cuenta está lista. Ahora puedes explorar el feed, conectar con personas, comprar en la tienda y mucho más.
      </p>
      <a href="{{appUrl}}" style="display:block;text-align:center;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#ffffff;padding:14px 24px;text-decoration:none;border-radius:12px;font-weight:700;font-size:15px;letter-spacing:0.5px">
        Abrir Kronos →
      </a>
    </div>
    <div style="padding:16px 32px 24px;text-align:center;color:rgba(10,10,20,0.35);font-size:12px">
      Si no creaste esta cuenta, ignora este correo.
    </div>
  </div>
</body>
</html>

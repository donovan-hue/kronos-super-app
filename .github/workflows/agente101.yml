name: Agente101 Auto Upload

on:
  push:
    branches:
      - main
      - agente-101
      - paquete-2-backend

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Comprimir proyecto
        run: zip -r paquete.zip . -x "*.git*" "node_modules/*"

      - name: Instalar AWS CLI
        uses: unfor19/install-aws-cli-action@v1

      - name: Subir a Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto

          aws s3 cp paquete.zip \
            s3://${{ secrets.R2_BUCKET }}/paquete-${{ github.run_number }}.zip \
            --endpoint-url=https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Finalizado
        run: echo "Paquete subido correctamente."

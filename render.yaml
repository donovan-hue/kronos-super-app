services:
  - type: web
    name: kronos-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: LOG_LEVEL
        value: info
      # Las siguientes se rellenan en el dashboard de Render (Environment tab).
      # NO las pongas aqui: este archivo se commitea a Git.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: SERVER_URL
        sync: false
      - key: SEED_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # ─── Stripe Price IDs · 3 productos (subscriptionPlans.js) ────
      - key: STRIPE_SOCIAL_PREMIUM_PRICE_ID
        sync: false
      - key: STRIPE_SCRIPTS_ESTANDAR_PRICE_ID
        sync: false
      - key: STRIPE_SCRIPTS_PREMIUM_PRICE_ID
        sync: false
      - key: STRIPE_SCRIPTS_PRO_PRICE_ID
        sync: false
      - key: STRIPE_MEDIA_ESTANDAR_PRICE_ID
        sync: false
      - key: STRIPE_MEDIA_PREMIUM_PRICE_ID
        sync: false
      - key: STRIPE_MEDIA_PRO_PRICE_ID
        sync: false
      # ─── Stripe Price IDs · legacy 3 tiers (subscriptionService.js) ─
      - key: STRIPE_PLUS_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # ─── Email (Nodemailer / Gmail) ───────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      # ─── Notificaciones push (VAPID) ──────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      # ─── Redis (opcional; sin esto el cache cae a memoria) ────────
      - key: REDIS_URL
        sync: false
      # ─── IA / Traducción ──────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      # ─── Login social (OAuth) — opcional ──────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      # ─── Web3 / Token KRO ─────────────────────────────────────────
      - key: INFURA_API_KEY
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: KRONOS_TOKEN_ADDRESS
        sync: false
